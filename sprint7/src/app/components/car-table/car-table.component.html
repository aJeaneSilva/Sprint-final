<div class="table-responsive">
  <table class="mt-2 table">
    <thead>
      <tr>
        <th class="p-3">VIN</th>
        <th class="p-3">ODÔMETRO</th>
        <th class="p-3">NÍVEL DO COMBUSTÍVEL</th>
        <th class="p-3">STATUS</th>
        <th class="p-3">LAT</th>
        <th class="p-3">LONG</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="p-3" data-label="VIN">
          <div class="vin-search">
            <input type="text" placeholder="Código VIN" value="{{ vin }}" (input)="onChangeVin($event)" />
            <button (click)="pesquisar()">Pesquisar</button>
          </div>
        </td>
        <td class="p-3" data-label="ODÔMETRO">{{odometro}}km</td>
        <td class="p-3" data-label="NÍVEL DO COMBUSTÍVEL">{{nivelCombustivel}}%</td>
        <td class="p-3" data-label="STATUS">{{status}}</td>
        <td class="p-3" data-label="LAT">{{lat}}</td>
        <td class="p-3" data-label="LONG">{{long}}</td>
      </tr>
    </tbody>
  </table>
</div>
